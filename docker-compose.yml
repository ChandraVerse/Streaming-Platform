services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  auth-service:
    build:
      context: ./services/auth-service
    environment:
      PORT: 4001
      MONGODB_URI: mongodb://mongodb:27017/unified-ott
      JWT_ACCESS_SECRET: access-secret-key
      JWT_REFRESH_SECRET: refresh-secret-key
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4001:4001"
    depends_on:
      - mongodb
  api-gateway:
    build:
      context: ./services/api-gateway
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  mongo_data:
